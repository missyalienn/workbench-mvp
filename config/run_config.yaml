# Evidence preview configuration.

queries:
  - "how to caulk a bathtub"
  - "how to bleed a radiator"

# Optional extra queries (uncomment to enable):
# - "how to repair holes in drywall"
# - "how to hang floating wall shelves"
# - "how to remove scratches from wood table"
# - "how to fix a broken light fixture"
# - "how to touch up chipped wall paint"
# - "how to mount a tv safely"
# - "how to paint a room properly"

prompt_version: "v3"

post_limit: 10

openai_environment: "openai-dev"
planner_model: "gpt-4.1-mini"
summarizer_model: "gpt-4.1-mini"

max_posts: 5
max_comments_per_post: 5
max_post_chars: 1200
max_comment_chars: 400

summary_char_budget: 900
max_highlights: 6
max_cautions: 5

# Optional: if omitted, a timestamped filename is generated.
# output_filename: "evidence_preview_example.json"
